services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banco_unico_api_v2
    restart: unless-stopped
    environment:
      PORT: 3327
      DB_HOST: banco_unico_postgres
      DB_PORT: 5432
      DB_NAME: banco_unico
      DB_USER: postgres
      DB_PASSWORD: Unico@2026
      DATABASE_SSL: "false"
      DEFAULT_SEARCH_LIMIT: 10
      MAX_SEARCH_LIMIT: 50
      CLIENT_DATABASE_POOL_MAX: 5
      CLIENT_DATABASE_POOL_IDLE_MS: 30000
      CLIENT_DATABASE_POOL_CONNECTION_TIMEOUT_MS: 10000
      CLIENT_DATABASES_JSON: ${CLIENT_DATABASES_JSON:-{}}
    ports:
      - "3327:3327"
    networks:
      - banco-unico_default

networks:
  banco-unico_default:
    external: true
